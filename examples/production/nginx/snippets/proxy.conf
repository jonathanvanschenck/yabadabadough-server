# Shared proxy headers.
#
# The app does not currently call express `trust proxy`, so X-Forwarded-* is
# informational (logging, and anything you add later) rather than load-bearing.
# Set them anyway so the app never has to guess it is behind a terminator.

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

proxy_buffering off;
