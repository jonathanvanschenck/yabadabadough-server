# Runs on every pull request and on pushes to master. Mark the `test` (and, if
# you want the image guaranteed buildable, `build`) job as a REQUIRED status
# check in the master branch protection rule so nothing merges red.
name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # better-sqlite3 downloads a prebuilt binary here; no compile needed.
      - run: npm ci
      - run: npm test

  # Proves the Dockerfile still builds (webapp vite build included) without
  # publishing anything. Single-platform for speed; the release workflow does
  # the multi-arch build.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
